<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Contact | Psychologist Kathia Urdiaín</title>
<meta name="description" content="Get in touch with Kathia Urdiaín, a psychologist specializing in brief therapy for anxiety, depression, stress and more.">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/tailwindcss@3.3.0/dist/tailwind.min.css">
</head>
<body class="bg-gray-100 text-gray-800">
<section class="bg-white py-16">
  <div class="container mx-auto px-4">
    <h1 class="text-4xl font-bold mb-6">Contact me</h1>
    <p class="mb-4">If you have questions about brief therapy or want immediate guidance, feel free to reach out. I'm here to help you start your journey toward emotional wellbeing.</p>
    <p class="mb-4">Email: <a href="mailto:info@psicologakathiaurdiain.com" class="text-teal-600 underline">info@psicologakathiaurdiain.com</a></p>
    <form class="max-w-md mx-auto" action="mailto:info@psicologakathiaurdiain.com" method="POST" enctype="text/plain">
      <input type="text" name="Name" placeholder="Your name" required class="w-full p-3 mb-3 rounded text-gray-800 border">
      <input type="email" name="Email" placeholder="Your email" required class="w-full p-3 mb-3 rounded text-gray-800 border">
      <select name="City" required class="w-full p-3 mb-3 rounded text-gray-800 border">
        <option value="">Select your location</option>
        <option>San Antonio, TX</option>
        <option>Mexico (other)</option>
      </select>
      <textarea name="Message" placeholder="How can I help you?" class="w-full p-3 mb-3 rounded text-gray-800 border" rows="4"></textarea>
      <button type="submit" class="bg-teal-600 hover:bg-teal-700 text-white py-3 px-6 rounded">Send message</button>
    </form>
    <p class="mt-6 text-sm text-center">Your information is confidential. You'll receive a response within 24 hours.</p>
  </div>
</section>
</body>
</html>
